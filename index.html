<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Regulatory Learning & Certification Portal — Sdmbrk Collections</title>
<style>
:root{
  --bg:#F4F6F5; --surface:#FFFFFF; --ink:#1C2422; --muted:#5F6B67; --line:#DDE4E1;
  --teal:#0E7C7B; --teal-dk:#0A5B5A; --teal-soft:#E3F1F0;
  --green:#16A34A; --green-dk:#116B33; --green-soft:#E7F6EC;
  --red:#C0392B; --red-soft:#FBEAE7;
  --gold:#C9A227; --amber-soft:#FBF3DC;
  --r:12px; --sh:0 1px 3px rgba(28,36,34,.08),0 4px 14px rgba(28,36,34,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font:inherit;color:var(--ink)}
.wrap{max-width:1100px;margin:0 auto;padding:0 16px 80px}
header{background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
.hbar{max-width:1100px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:12px}
.brand{display:flex;flex-direction:column;line-height:1.15;cursor:pointer}
.brand .k{font-size:10px;letter-spacing:.22em;color:var(--teal);font-weight:700}
.brand .t{font-size:16px;font-weight:700}
.hspace{flex:1}
.adm-pill{font-size:12px;font-weight:600;padding:6px 12px;border-radius:99px;border:1px solid var(--line);color:var(--muted)}
.adm-pill.on{background:var(--teal);border-color:var(--teal);color:#fff}
.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);font-weight:700;margin:26px 0 6px}
h1.page{font-size:26px;font-weight:750;letter-spacing:-.01em}
h2.sec{font-size:18px;font-weight:700;margin:22px 0 10px}
.sub{color:var(--muted);font-size:14px;margin-top:4px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:9px;font-weight:600;font-size:14px;border:1px solid var(--line);background:var(--surface);transition:.15s}
.btn:hover{border-color:var(--teal);color:var(--teal)}
.btn.pri{background:var(--teal);border-color:var(--teal);color:#fff}
.btn.pri:hover{background:var(--teal-dk)}
.btn.grn{background:var(--green);border-color:var(--green);color:#fff}
.btn.grn:hover{background:var(--green-dk)}
.btn.dngr{color:var(--red)}
.btn.dngr:hover{border-color:var(--red)}
.btn.dngr.armed{background:var(--red);color:#fff;border-color:var(--red)}
.btn.sm{padding:6px 11px;font-size:13px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--muted);text-transform:uppercase}
.field input,.field select,.field textarea{padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;width:100%}
.field textarea{min-height:120px;resize:vertical;font-family:ui-monospace,Consolas,monospace;font-size:13px}
.field input:focus,.field textarea:focus,.field select:focus{outline:2px solid var(--teal-soft);border-color:var(--teal)}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:99px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:200;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%)}
.catgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-top:14px}
.catcard{padding:20px;display:flex;flex-direction:column;gap:8px;min-height:170px;position:relative;overflow:hidden;cursor:pointer;transition:.15s}
.catcard:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(28,36,34,.12)}
.catcard .cico{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--teal-soft)}
.catcard h3{font-size:17px;font-weight:700}
.catcard .meta{font-size:12.5px;color:var(--muted);margin-top:auto;display:flex;gap:12px;flex-wrap:wrap}
.catcard.ph{opacity:.62;cursor:default;border-style:dashed}
.catcard.ph:hover{transform:none;box-shadow:var(--sh)}
.tagline{position:absolute;top:14px;right:14px;font-size:10px;font-weight:700;letter-spacing:.12em;padding:3px 9px;border-radius:99px}
.tag-act{background:var(--green-soft);color:var(--green-dk)}
.tag-ph{background:#EEF1EF;color:var(--muted)}
.catcard.addnew{border-style:dashed;align-items:center;justify-content:center;color:var(--muted);font-weight:600;opacity:.9}
.catcard.addnew:hover{color:var(--teal);border-color:var(--teal)}
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--line);margin:18px 0 18px;overflow-x:auto}
.tab{padding:10px 16px;font-weight:600;font-size:14px;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap}
.tab.on{color:var(--teal);border-color:var(--teal)}
.doclist{display:flex;flex-direction:column;gap:10px}
.docrow{display:flex;align-items:center;gap:14px;padding:14px 16px}
.docrow .dico{width:38px;height:38px;border-radius:9px;background:var(--red-soft);color:var(--red);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;flex-shrink:0}
.docrow .dnm{font-weight:600;word-break:break-word}
.docrow .dsz{font-size:12px;color:var(--muted)}
.docrow .dsp{flex:1}
.viewerbox{margin-top:14px}
.viewerbox iframe{width:100%;height:72vh;border:1px solid var(--line);border-radius:var(--r);background:#fff}
.studysec{padding:18px 20px;margin-bottom:14px}
.studysec h3{font-size:16px;font-weight:700;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.studysec .snum{width:26px;height:26px;border-radius:7px;background:var(--teal);color:#fff;font-size:12.5px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.studysec .stitle{flex:1}
.studysec .chev{color:var(--teal);font-size:14px;transition:.2s;flex-shrink:0}
.coverimg{max-width:100%;border-radius:9px;border:1px solid var(--line);margin-top:12px;display:block}
.togbar{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:10px;padding:9px;border:1.5px dashed var(--line);border-radius:9px;color:var(--teal);font-weight:600;font-size:13.5px;transition:.15s}
.togbar:hover{border-color:var(--teal);background:var(--teal-soft)}
.secbody{margin-top:4px}
.notes{margin-top:10px;font-size:14.5px}
.notes h4{font-size:14px;font-weight:700;margin:14px 0 4px;color:var(--teal-dk)}
.notes ul{padding-left:20px;margin:6px 0}
.notes li{margin:3px 0}
.notes p{margin:6px 0}
.notes table{border-collapse:collapse;margin:10px 0;width:100%;font-size:13.5px}
.notes th{background:var(--teal-soft);text-align:left}
.notes th,.notes td{border:1px solid var(--line);padding:7px 10px}
.notes img{max-width:100%;border-radius:9px;border:1px solid var(--line);margin:8px 0;display:block}
.notes .warnbox{background:var(--amber-soft);border-left:3px solid var(--gold);padding:9px 12px;border-radius:0 8px 8px 0;margin:8px 0;font-size:13.5px}
.imggal{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
.imggal .thumb{position:relative}
.imggal img{width:90px;height:90px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
.imggal .rm{position:absolute;top:-7px;right:-7px;width:22px;height:22px;border-radius:50%;background:var(--red);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center}
.imggal .tag{position:absolute;bottom:3px;left:3px;background:rgba(28,36,34,.75);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:6px}
.qwrap{max-width:720px;margin:0 auto}
.qprog{height:7px;background:var(--line);border-radius:99px;overflow:hidden;margin:16px 0}
.qprog i{display:block;height:100%;background:var(--teal);transition:.3s;border-radius:99px}
.qcard{padding:24px}
.qnum{font-size:12px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
.qtext{font-size:17px;font-weight:650;margin:8px 0 18px;line-height:1.45}
.opt{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;border:1.5px solid var(--line);border-radius:10px;margin-bottom:9px;cursor:pointer;transition:.12s}
.opt:hover{border-color:var(--teal)}
.opt.sel{border-color:var(--teal);background:var(--teal-soft)}
.opt .ol{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;background:#fff}
.opt.sel .ol{background:var(--teal);border-color:var(--teal);color:#fff}
.qnav{display:flex;gap:10px;margin-top:18px;align-items:center}
.qdots{display:flex;gap:5px;flex-wrap:wrap;margin:14px 0}
.qdot{width:26px;height:26px;border-radius:7px;border:1px solid var(--line);font-size:11.5px;font-weight:700;color:var(--muted);background:#fff}
.qdot.ans{background:var(--teal-soft);border-color:var(--teal);color:var(--teal-dk)}
.qdot.cur{outline:2px solid var(--teal)}
.result{max-width:640px;margin:30px auto;text-align:center;padding:36px 26px}
.scorering{width:150px;height:150px;margin:0 auto 16px;position:relative}
.scorering svg{transform:rotate(-90deg)}
.scorering .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:32px;font-weight:800}
.scorering .pct small{font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--muted)}
.verdict{font-size:38px;font-weight:850;letter-spacing:.04em;margin:6px 0}
.verdict.pass{color:var(--green)}
.verdict.fail{color:var(--red)}
.rline{color:var(--muted);font-size:14px;margin-bottom:20px}
.review{max-width:720px;margin:20px auto;text-align:left}
.rvq{padding:15px 17px;margin-bottom:10px;border-left:4px solid var(--line)}
.rvq.ok{border-left-color:var(--green)}
.rvq.bad{border-left-color:var(--red)}
.rvq .rq{font-weight:650;margin-bottom:5px}
.rvq .ra{font-size:13.5px;margin:2px 0}
.rvq .expl{font-size:13px;color:var(--muted);margin-top:6px;background:var(--bg);padding:8px 10px;border-radius:8px}
.mback{position:fixed;inset:0;background:rgba(20,26,24,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border-radius:14px;max-width:560px;width:100%;max-height:90vh;overflow:auto;padding:24px}
.modal h3{font-size:18px;font-weight:700;margin-bottom:14px}
.modal.wide{max-width:900px}
.admbox{padding:18px 20px;margin-bottom:16px}
.admbox h3{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.qbrow{display:flex;gap:10px;align-items:flex-start;padding:11px 14px;border:1px solid var(--line);border-radius:9px;margin-bottom:8px;font-size:13.5px}
.qbrow .qbq{flex:1;font-weight:600}
.qbrow .qbmeta{font-size:11.5px;color:var(--muted);font-weight:400;margin-top:2px}
.emptybox{padding:34px 20px;text-align:center;color:var(--muted);border:1.5px dashed var(--line);border-radius:var(--r);font-size:14px}
.certprev{width:100%;border:1px solid var(--line);border-radius:10px;background:#fff}
.crumb{font-size:13px;color:var(--muted);margin-top:18px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.crumb b{color:var(--ink)}
.crumb button{color:var(--teal);font-weight:600}
.hint{font-size:12.5px;color:var(--muted);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:9px 12px;margin-bottom:10px;font-family:ui-monospace,Consolas,monospace;word-break:break-word}
footer.app{max-width:1100px;margin:0 auto;padding:26px 16px;color:var(--muted);font-size:12.5px;text-align:center;border-top:1px solid var(--line)}
@media(max-width:640px){
  h1.page{font-size:21px}
  .verdict{font-size:30px}
  .qcard{padding:18px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header><div class="hbar">
  <div class="brand" id="brandhome">
    <span class="k">SDMBRK COLLECTIONS</span>
    <span class="t">Regulatory Learning &amp; Certification Portal</span>
  </div>
  <div class="hspace"></div>
  <button class="adm-pill" id="admbtn">Admin: OFF</button>
</div></header>
<div class="wrap" id="app"></div>
<footer class="app">Regulatory Learning &amp; Certification Portal · Pass mark 70% · Built for site &amp; office use · <b>Sdmbrk Collections</b></footer>
<div class="toast" id="toast"></div>
<script>
function el(tag,attrs,kids){var n=document.createElement(tag);attrs=attrs||{};
for(var k in attrs){if(k==='cls')n.className=attrs[k];else if(k==='text')n.textContent=attrs[k];else if(k==='html')n.innerHTML=attrs[k];else if(k.slice(0,2)==='on')n.addEventListener(k.slice(2),attrs[k]);else if(k==='style')n.setAttribute('style',attrs[k]);else n.setAttribute(k,attrs[k]);}
(kids||[]).forEach(function(c){if(c==null)return;n.appendChild(typeof c==='string'?document.createTextNode(c):c);});return n;}
function div(cls,kids){return el('div',{cls:cls},kids);}
function btn(label,cls,fn){return el('button',{cls:'btn '+(cls||''),onclick:fn,text:label});}
function mount(node){var a=document.getElementById('app');a.innerHTML='';a.appendChild(node);window.scrollTo(0,0);}
var toastT=null;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},2600);}
function armBtn(b,fn,label){
  var armed=false,timer=null;
  b.addEventListener('click',function(){
    if(!armed){armed=true;b.classList.add('armed');b.textContent='Tap again to confirm';timer=setTimeout(function(){armed=false;b.classList.remove('armed');b.textContent=label;},3500);}
    else{clearTimeout(timer);fn();}
  });return b;}
function uid(){return Math.random().toString(36).slice(2,8).toUpperCase();}
function fmtBytes(b){return b>1048576?(b/1048576).toFixed(1)+' MB':Math.round(b/1024)+' KB';}
function todayStr(){var d=new Date();return d.toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'});}
function secImgs(s){return s.imgs||(s.img?[s.img]:[]);}

var LS='rlcp_v1';
var S=null;
function save(){try{localStorage.setItem(LS,JSON.stringify(S));}catch(e){toast('Save failed — storage may be full (large images). Remove some images.');}}
function load(){
  try{S=JSON.parse(localStorage.getItem(LS));}catch(e){S=null;}
  if(!S){S=seedState();S.ver=3;save();return;}
  if(!S.ver||S.ver<2){
    var dc=null;S.cats.forEach(function(c){if(c.id==='dubai-codes')dc=c;});
    if(dc){
      dc.sections=dc.sections.filter(function(s){return s.title!=='DBC Overview & Applicability';});
      var pa=seedPartA();
      for(var i=pa.length-1;i>=0;i--)dc.sections.unshift(pa[i]);
    }
    S.ver=2;
  }
  if(S.ver<3){
    S.cats.forEach(function(c){(c.sections||[]).forEach(function(s){if(!s.imgs)s.imgs=s.img?[s.img]:[];});});
    S.ver=3;
  }
  save();
}
var idb=null;
function idbOpen(cb){
  if(idb)return cb(idb);
  var rq=indexedDB.open('rlcp_pdfs',1);
  rq.onupgradeneeded=function(e){e.target.result.createObjectStore('pdfs',{keyPath:'id'});};
  rq.onsuccess=function(e){idb=e.target.result;cb(idb);};
  rq.onerror=function(){toast('Storage unavailable — PDFs cannot be saved');};
}
function pdfPut(rec,cb){idbOpen(function(db){var tx=db.transaction('pdfs','readwrite');tx.objectStore('pdfs').put(rec);tx.oncomplete=cb;tx.onerror=function(){toast('PDF save failed (file too large?)');};});}
function pdfGet(id,cb){idbOpen(function(db){var rq=db.transaction('pdfs').objectStore('pdfs').get(id);rq.onsuccess=function(){cb(rq.result);};});}
function pdfDel(id,cb){idbOpen(function(db){var tx=db.transaction('pdfs','readwrite');tx.objectStore('pdfs').delete(id);tx.oncomplete=cb;});}

function seedState(){
  return {
    adminPass:'sdmbrk', adminOn:false,
    results:[],
    cats:[
      { id:'dubai-codes', name:'Dubai Codes', icon:'🏗️', active:true,
        desc:'Dubai Building Code (DBC 2021) — study notes, reference documents and certification exam.',
        docs:[], sections: seedPartA().concat(seedSections()), questions: seedQuestions(),
        examName:'Dubai Building Code Certification', quizCount:20 },
      { id:'dewa', name:'DEWA Regulations', icon:'⚡', active:false,
        desc:'DEWA Regulations for Electrical Installations — coming soon.',
        docs:[],sections:[],questions:[],examName:'DEWA Regulations Certification',quizCount:20},
      { id:'dcd', name:'Dubai Civil Defense', icon:'🧯', active:false,
        desc:'UAE Fire & Life Safety Code of Practice — coming soon.',
        docs:[],sections:[],questions:[],examName:'DCD Fire & Life Safety Certification',quizCount:20}
    ]
  };
}
function seedPartA(){
 return [
 {id:uid(),title:'Part A §A.1 — Objectives & Basis of the DBC (2021)',imgs:[],notes:
"## What the DBC is for\n- Unifies building design regulation across all of Dubai under one code, replacing the fragmented authority-by-authority system.\n- Sets MINIMUM requirements only — nothing stops a design exceeding them.\n## The four mandated objectives\n- Health, safety, welfare and convenience of people IN and AROUND buildings.\n- Same protection for people who might be AFFECTED by buildings (neighbours, public).\n- Reducing building impact on the surrounding environment.\n- Sustainable development of buildings.\n## Where its content came from\n- Existing regulations from the various Authorities and Service Providers.\n- Stakeholder interviews (Authorities, Service Providers, Master Developers, Consultants) to find gaps and inconsistencies.\n- Benchmarking against international and regional codes.\n- Arranged by THEMES (Parts) to integrate all elements of building design.\n!! Exam trap: DBC = minimum requirements. Higher standards are always permitted."},
 {id:uid(),title:'Part A §A.2 — Key Definitions',imgs:[],notes:
"## People & entities\n- Architect / Engineer / Civil Engineer: person in charge of design or supervision AND licensed to practise in Dubai under applicable legislation.\n- Consultant: gives consulting advice during design or construction; licensed in Dubai.\n- Contractor: carries out construction works; licensed for contracting in Dubai.\n- Developer: prepares land, constructs buildings, creates subdivisions, rehabilitates buildings.\n- Owner: anyone with legal/equitable interest registered as owner — includes long-term leaseholders and the Main/Sub-Developer for unsold units.\n- Authority: any ministry, department or government institution connected to implementing the DBC.\n## Works on existing buildings (know the ladder!)\n| Term | Meaning |\n| Renovation | Linings/finishes change or structural strengthening — NO internal reconfiguration |\n| Modification | Fit-out of a space/unit, or change to a service system or building element |\n| Reconstruction | Modification that is NOT standalone — affects adjacent egress/systems, larger part may need closing |\n| Change of use | New occupancy different from original design |\n| Addition | Increase in gross/built-up area, height or depth |\n## Dwellings\n- Villa: separate building on its own plot, all floors for ONE family, independent parking + external open space.\n- Townhouse: multiple villas connected by one or more walls in a series.\n## Design approaches\n- Prescriptive design: meets the written requirements entirely.\n- Performance-based design: follows prescriptive route but substitutes alternative solution(s) equal or better for some aspect(s).\n## Spaces\n- Habitable space: living/sleeping/eating with continuous occupancy. Bathrooms, closets, halls, storage, utility = NOT habitable.\n- Occupiable space: enclosed space where people congregate (amusement, labour, education).\n!! Renovation vs Modification vs Reconstruction is a favourite consultant/exam distinction — memorise the ladder."},
 {id:uid(),title:'Part A §A.3 — References, Acronyms & Verbal Forms',imgs:[],notes:
"## Essential cross-references (Ref. A.1–A.7)\n- UAE Fire & Life Safety Code of Practice 2018 (UAE FLSC) — Ministry of Interior Civil Defence. THE fire companion to the DBC.\n- Dubai Universal Design Code 2017 — accessibility.\n- DHA regulations + DHA Health Facility Guidelines — healthcare design.\n- DTCM hotel classification criteria — star ratings.\n- DCAA no-objection certificate — buildings in aviation easement areas (above and below 300 m).\n- UK CDM Regulations 2015 — reference for safe-by-design principles.\n## Verbal forms — MANDATORY knowledge\n| Word | Meaning in DBC |\n| Shall | Mandatory |\n| Should | Recommended |\n| May | Permitted |\n## Acronyms worth memorising\n- DM (Dubai Municipality), DDA, Trakhees, DSOA — planning authorities replaced/unified by DBC.\n- DEWA, IACAD — incorporated or cross-referenced.\n- SIRA (security, Part J), TRA (telecom, G.11), RTA (right of way), DCAA (heights), KHDA (education licensing).\n- FAR, GFA, GA, NA — area terms. DLTM — Dubai Local Transverse Mercator. BIM, MEP.\n!! Shall / should / may distinctions decide what is enforceable. 'Shall' lines are the exam material."},
 {id:uid(),title:'Part A §A.4 — Relationship to Other Regulations & Hierarchy',imgs:[],notes:
"## What the DBC replaces vs keeps\n- REPLACES building-design regulations of DM, DDA, Trakhees and DSOA.\n- INCORPORATES or cross-references DEWA and IACAD requirements.\n- SUMMARISES SIRA security rules (Part J); follows TRA federal telecom rules (G.11).\n- UAE FLSC remains in force — cross-referenced throughout.\n- Accessibility parts of Dubai Universal Design Code absorbed into Part C.\n- DHA + federal rules still govern healthcare facilities; DTCM sets hotel star criteria (DBC compliance ≠ star rating — consult DTCM early).\n- KHDA / Ministry of Education license schools but give no separate design rules.\n- RTA (right of way) and DCAA (flight-path height limits) still apply.\n- Planning/development regulations by developers or planning authorities are NOT replaced; DBC Part B planning rules apply only where plot-specific DCR is unavailable.\n## International codes\n- DBC relies mainly on BS EN and American codes — use LATEST edition unless the DBC pins an edition (e.g. ASCE/SEI 7-2016 in structures).\n- An edition is pinned either because cross-references are version-specific or because that edition was reviewed for Dubai.\n## Hierarchy (A.4.3)\n- DBC + UAE FLSC together = the main regulations for building design in Dubai.\n- Then SIRA (security), TRA (telecom), essential references in each Part.\n- 'Further reading' lists are informative only — not requirements.\n- Conflict between DBC and referenced codes → MOST RESTRICTIVE / highest performance wins.\n- Conflict between a general and a specific DBC requirement → SPECIFIC wins.\n## Safe by design (A.4.4)\n- Consultant addresses health & safety across the whole building lifecycle (contractors, maintenance, occupants, visitors, demolition).\n- Documented in a RISK REGISTER: acknowledge risk → investigate mitigation → design solution reducing risk to practicable level.\n- NOT mandated in the first edition, but expected to be enforced in future revisions.\n!! Two conflict rules — most restrictive between codes; specific over general within the DBC. Both are classic exam questions."},
 {id:uid(),title:'Part A §A.5 — Scope, Occupancies & Exclusions',imgs:[],notes:
"## Applies to\n- New buildings, plus changes to existing buildings: renovation, modification, reconstruction, change of use, addition — DBC + UAE FLSC apply to the changed area and anything impacted by it.\n- For an ADDITION relying on the existing building for escape/vertical transport, the EXISTING building must also be assessed.\n## Occupancy classes (Table A.2)\n- Assembly, Business, Educational, Hotel establishment, Residential (incl. villas & townhouses), Parking, Retail, Mall, Industrial, Storage.\n## DBC does NOT apply to\n- Infrastructure: bridges, tunnels, culverts, metro stations, hydraulic structures, buried/overhead utilities, power stations, antennas/masts, wind turbines, nuclear.\n- Marine structures: canals, dams, dikes, piers, jetties, wharves.\n- Oil & gas: petrochemical facilities, refineries, LNG terminals, platforms, tanks.\n- Temporary/support structures: tents, cranes, storage racks, scaffolding, formwork, falsework.\n- Special loading structures: stadia, grandstands, silos, chimneys.\n- Historical buildings keeping original character (follow relevant Authority guidelines).\n- Heritage buildings DO follow the DBC, but the heritage department controls elevation & façade.\n- Villas & townhouses: addressed in Part K.\n!! Heritage vs historical: heritage follows DBC (with façade control); historical is outside DBC. Easy marks."},
 {id:uid(),title:'Part A §A.5.2 — Area & Height Definitions (GFA, Built-up, GA/NA)',imgs:[],notes:
"## GFA (gross floor area)\n- Used by planning authorities: FAR = GFA ÷ plot area.\n- Sum of all floors measured to the exterior surface of external walls and centrelines of common walls; excludes cornices, brackets, façade cladding.\n- Consultants use the DBC definition + tables unless the DCR states GFA.\n## GFA quick memory table (condensed from Table A.3)\n| Included | Excluded |\n| Habitable/occupiable spaces + sanitary | Parking, parking lobbies, internal roads |\n| Mezzanines, lobbies, corridors, stairs | Mechanical/service rooms, ducts, MEP plant floors |\n| Elevator shaft at recall floor only | Elevator shafts other floors + machine rooms |\n| Basement habitable areas (non-villa) | Villa basements, storage below ground |\n| Storage on ground & above | Shafts, refuse chutes, waste rooms |\n| Base of double-height volumes/atria | Voids, floor voids, terraces, balconies |\n| Gym area beyond 50% of roof area | Gym ≤50% of roof area, pools + services, prayer/ablution, open arcades |\n## Built-up area\n- Total constructed area from external walls INCLUDING balconies, terraces, projections, covered parking, corridors, basements, service floors, indoor pools.\n- EXCLUDES: shafts/courtyards (incl. MEP shafts, refuse chutes), uncovered landscape/hardscape, lightweight shading (pergolas, standalone canopies).\n## GA and NA\n- Gross area (GA): inside perimeter of exterior walls; excludes shafts/courtyards; includes corridors, stairs, ramps, closets, atria bases, interior wall thickness. Used for occupant load.\n- Net area (NA): actual occupied area only — no corridors, stairs, ramps, toilets, mech rooms, closets.\n## Building height\n- Checked against DBC, DCR/affection plans, UAE FLSC and (in aviation easement areas) DCAA rules — each defines height slightly differently, so check ALL.\n!! Gym 50% rule applies to gyms anywhere in the building even though it references roof area."},
 {id:uid(),title:'Part A §A.6–A.9 — Navigation, Adoption, Alternative Solutions, Maintenance',imgs:[],notes:
"## Structure of the code (A.6)\n- Parts: A General · B Architecture · C Accessibility · D Vertical transportation · E Building envelope · F Structure · G Incoming utilities · H Indoor environment · J Security · K Villas.\n- Each Part opens with PERFORMANCE STATEMENTS (broad outcomes). Follow the prescriptive requirements → performance statements deemed met → Authority accepts.\n- Sustainability minimums embedded in relevant Parts; rating systems encouraged beyond minimum.\n- Each Part has its own definitions, essential references (enforceable) vs further reading (informative), and annexes (explanatory).\n## Adoption (A.7)\n- Final approved design already issued → DBC conformity NOT required.\n- In design without final approval → DBC applies.\n- DBC often LESS stringent than the old rules (non-HSE requirements removed) → benefit to adopt.\n## Alternative solutions (A.8)\n- Permitted when prescriptive requirements can't reasonably be met, or for existing-building changes where compliance cost is disproportionate.\n- Must meet performance-statement intent and give AT LEAST equivalent performance to ALL prescriptive requirements.\n- Applied HOLISTICALLY — a change in one Part must not degrade performance elsewhere.\n- For existing buildings: maintain current compliance level or improve toward DBC/FLSC.\n- The AUTHORITY decides acceptance; the CONSULTANT carries the burden of proof.\n- Alternative international standards allowed where Authority permits and intent is met.\n## Maintenance & housekeeping (A.9–A.11)\n- DBC is electronic/interactive; updated on a 2–3 year cycle with addendums between — always check you're on the latest version.\n- 2021 = first edition; future amendments will be side-lined in text.\n- Copyright: DBC content may not be copied, printed, sold or reproduced in any format.\n- Coordinate system: Dubai Local Transverse Mercator (DLTM); levelling reference = Port Rashid.\n!! Burden of proof for alternative solutions sits with the Consultant, decision with the Authority — never the Contractor."},
 {id:uid(),title:'Part A §A.12 — Dimensions, Units & Calculations',imgs:[],notes:
"## Dimensions (A.12.1)\n- Figures/diagrams: millimetres WITHOUT units, unless over 1,000 mm → then metres WITH units (m).\n- Not stated as max or min → the dimension is ABSOLUTE.\n- Conventional industry tolerances apply, except where a min–max range is explicitly stated.\n## Units (A.12.2)\n- All quantities metric, units defined.\n- Engineering in dynamically consistent units — either SI, mm-t-s, or mm-kg-ms systems.\n- Dimensions across analysis models, drawings and BIM must be fully coordinated and consistent.\n## Calculations (A.12.3)\n- Ratio/percentage calcs for required counts (parking, sanitary, etc.) that give fractions → ROUND UP to the next whole number. Always.\n!! Fractional results always round UP — 10.1 parking spaces means 11. Straight exam material."},
 ];
}

 return [
 {id:uid(),title:'Access, Egress & Accessibility (Part B)',imgs:[],notes:
"## Key dimensional requirements (typical villa/residential)\n| Element | Minimum requirement |\n| Door clear width (habitable rooms) | 800 mm clear |\n| Accessible entrance door | 850–900 mm clear |\n| Corridor width (dwelling) | 900 mm |\n| Stair riser (private stair) | max 190 mm |\n| Stair going (private stair) | min 250 mm |\n| Handrail height | 900–1000 mm above pitch line |\n| Guarding height (balconies) | min 1100 mm |\n- Guarding gaps must not allow a 100 mm sphere to pass (child safety).\n- Level thresholds (max 15 mm, chamfered) at accessible entrances.\n## Sanitary provision\n- At least one accessible WC on the entrance level of accessible dwellings.\n!! Balcony guarding on villas is a recurring consultant comment — verify 1100 mm from finished floor level after tiling, not from slab."},
 {id:uid(),title:'Structure & Materials (Part F)',imgs:[],notes:
"## Design basis\n- Loads and combinations generally follow international standards adopted by DBC (dead, imposed, wind per local wind maps, seismic zoning for Dubai). Part F mandates ASCE/SEI 7-2016.\n- Durability: concrete cover and mix designed for hot, saline, sulphate-bearing ground conditions — typical severe exposure classes for foundations.\n## Practical site notes\n- Concrete in foundations commonly requires SRC or PC+GGBS/PFA blends with protective coatings + polythene separation per soil report.\n- Curing is critical in UAE summer: retain moisture minimum 7 days; avoid casting large pours in peak afternoon temperatures.\n!! Hot-weather concreting: max concrete temperature at placement is typically 32°C per specifications — check the project spec, plan ice/chilled water with the batching plant."},
 {id:uid(),title:'Building Services — Electrical & Mechanical (Parts G/H)',imgs:[],notes:
"## Electrical\n- Electrical installations must comply with DEWA Regulations for Electrical Installations (current edition) — DBC incorporates/cross-references DEWA.\n- Standard LV system: 400/230 V, 3-phase, 50 Hz, TN-S earthing per DEWA.\n- Cable sizing to IEC 60228 conductor classes; derate for 50°C ambient and grouping.\n- RCD protection (30 mA) required for socket circuits and wet areas.\n- Telecom rules per TRA, documented in G.11.\n## Mechanical & plumbing\n- Ventilation rates, condensate drainage and fresh-air provision per DBC Part H and Dubai Municipality requirements.\n- Water supply and drainage per DM / ADSSC-aligned standards; backflow prevention on connections to potable water.\n!! Condensate drains from FCUs must be trapped and routed with fall — untrapped condensate lines are a classic snag causing ceiling stains that get mistaken for leaks."},
 {id:uid(),title:'Fire Safety Interface (UAE FLS Code)',imgs:[],notes:
"## Division of responsibility\n- The DBC cross-references the UAE Fire & Life Safety Code of Practice (DCD/Ministry of Interior) for fire matters: compartmentation, escape distances, fire-rated doors, detection & alarm, firefighting systems. Together they form the main building-design regulations.\n## Villa-level essentials\n- Smoke detectors in bedrooms, corridors and living areas connected to a home alarm panel.\n- Kitchen: heat detector (not smoke) to avoid nuisance alarms.\n- Fire-rated door and self-closer where garage connects to dwelling.\n- LPG cylinders: outdoor ventilated enclosure, piping per DCD requirements.\n!! Any deviation on fire systems needs DCD approval — municipality approval alone does not cover fire."},
 ];
}

function renderNotes(txt,imgs){
  imgs=imgs||[];
  var box=div('notes'),lines=String(txt||'').split('\n'),i=0;
  while(i<lines.length){
    var L=lines[i];
    var im=L.match(/^\[img:(\d+)\]\s*$/);
    if(im){
      var idx=parseInt(im[1])-1;
      if(imgs[idx])box.appendChild(el('img',{src:imgs[idx],alt:'figure '+im[1]}));
      i++;continue;
    }
    if(/^\|/.test(L)){
      var rows=[];while(i<lines.length&&/^\|/.test(lines[i])){rows.push(lines[i].replace(/^\||\|$/g,'').split('|').map(function(c){return c.trim();}));i++;}
      var tb=el('table');rows.forEach(function(r,ri){var tr=el('tr');r.forEach(function(c){tr.appendChild(el(ri===0?'th':'td',{text:c}));});tb.appendChild(tr);});
      box.appendChild(tb);continue;
    }
    if(/^## /.test(L)){box.appendChild(el('h4',{text:L.slice(3)}));i++;continue;}
    if(/^!! /.test(L)){box.appendChild(div('warnbox',['⚠ '+L.slice(3)]));i++;continue;}
    if(/^- /.test(L)){var ul=el('ul');while(i<lines.length&&/^- /.test(lines[i])){ul.appendChild(el('li',{text:lines[i].slice(2)}));i++;}box.appendChild(ul);continue;}
    if(L.trim()){box.appendChild(el('p',{text:L}));}
    i++;
  }
  return box;
}
function cat(id){return S.cats.filter(function(c){return c.id===id;})[0];}

function modal(title,bodyNodes,wide){
  var back=div('mback');
  var m=div('modal'+(wide?' wide':''),[el('h3',{text:title})]);
  bodyNodes.forEach(function(n){m.appendChild(n);});
  back.appendChild(m);
  back.addEventListener('click',function(e){if(e.target===back)back.remove();});
  document.body.appendChild(back);
  return back;
}

var QZ=null;
function startQuiz(c,n){
  var pool=c.questions.slice();
  for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t;}
  QZ={cid:c.id,qs:pool.slice(0,n),ans:new Array(n).fill(-1),cur:0};
  vQuiz();
}
function vQuiz(){
  var c=cat(QZ.cid),i=QZ.cur,q=QZ.qs[i],n=QZ.qs.length;
  var w=div('qwrap',[
    div('crumb',[el('button',{text:'‹ Exit exam',onclick:function(){vCat(c.id,'exam');}}),div('dsp'),el('b',{text:c.examName})]),
    div('qprog',[el('i',{style:'width:'+Math.round((i+1)/n*100)+'%'})])
  ]);
  var dots=div('qdots');
  QZ.qs.forEach(function(_,di){
    dots.appendChild(el('button',{cls:'qdot'+(QZ.ans[di]>=0?' ans':'')+(di===i?' cur':''),text:String(di+1),onclick:function(){QZ.cur=di;vQuiz();}}));
  });
  w.appendChild(dots);
  var qc=div('qcard card',[el('div',{cls:'qnum',text:'Question '+(i+1)+' of '+n+' · '+q.sec}),el('div',{cls:'qtext',text:q.q})]);
  q.opts.forEach(function(o,oi){
    var opt=div('opt'+(QZ.ans[i]===oi?' sel':''),[div('ol',[String.fromCharCode(65+oi)]),el('span',{text:o})]);

function shrinkImage(dataUrl,cb){
  var img=new Image();
  img.onload=function(){
    var maxW=1400;
    if(img.width<=maxW){cb(dataUrl);return;}
    var scale=maxW/img.width;
    var cv=document.createElement('canvas');
    cv.width=maxW;cv.height=Math.round(img.height*scale);
    cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
    cb(cv.toDataURL('image/jpeg',0.82));
  };
  img.onerror=function(){cb(dataUrl);};
  img.src=dataUrl;
}
function admEditSection(c,s){
  var isNew=!s;if(isNew)s={id:uid(),title:'',notes:'',imgs:[]};
  var imgs=secImgs(s).slice();
  var tI=el('input',{placeholder:'Section title'});tI.value=s.title;
  var nI=el('textarea',{placeholder:'Notes. Formatting: "## " heading, "- " bullet, "| a | b |" table row, "!! " warning box, "[img:2]" places image #2 inline'});
  nI.value=s.notes||'';
  var gal=div('imggal');
  function renderGal(){
    gal.innerHTML='';
    if(!imgs.length){gal.appendChild(el('span',{cls:'sub',text:'No images yet. Image #1 is the cover (always visible); others show inside the collapsible details.'}));return;}
    imgs.forEach(function(im,idx){
      var th=div('thumb',[
        el('img',{src:im}),
        el('span',{cls:'tag',text:idx===0?'#1 COVER':'#'+(idx+1)}),
        el('button',{cls:'rm',text:'✕',onclick:function(){imgs.splice(idx,1);renderGal();}})
      ]);
      gal.appendChild(th);
    });
  }
  renderGal();
  var imgI=el('input',{type:'file',accept:'image/*',multiple:''});
  imgI.addEventListener('change',function(e){
    var files=Array.prototype.slice.call(e.target.files||[]);
    if(!files.length)return;
    var pending=files.length;
    files.forEach(function(f){
      var fr=new FileReader();
      fr.onload=function(){
        shrinkImage(fr.result,function(small){
          imgs.push(small);
          pending--;if(pending===0){renderGal();toast(files.length+' image(s) attached');}
        });
      };
      fr.readAsDataURL(f);
    });
  });
  var urlI=el('input',{placeholder:'https://sdmbrk.github.io/imgs/figure1.png',type:'url'});

    var u=urlI.value.trim();if(!u){toast('Paste an image URL');return;}
    toast('Downloading image…');
    fetch(u).then(function(r){if(!r.ok)throw 0;return r.blob();}).then(function(bl){
      var fr=new FileReader();
      fr.onload=function(){shrinkImage(fr.result,function(small){imgs.push(small);renderGal();urlI.value='';toast('Image added');});};
      fr.readAsDataURL(bl);
    }).catch(function(){toast('Image download failed — check URL/CORS (GitHub Pages works)');});
  });
  var m=modal((isNew?'Add':'Edit')+' study section',[
    div('field',[el('label',{text:'Title'}),tI]),
    div('field',[el('label',{text:'Images ('+'#1 = cover, rest in details; use [img:N] in notes for inline placement)'}),gal]),
    div('field',[el('label',{text:'Add images from device'}),imgI]),
    div('field',[el('label',{text:'Add image from URL (works on mobile)'}),urlI,urlBtn]),
    div('field',[el('label',{text:'Notes'}),nI]),
    btn('Save section','pri',function(){
      if(!tI.value.trim()){toast('Title required');return;}
      s.title=tI.value.trim();s.notes=nI.value;s.imgs=imgs;s.img=imgs[0]||null;
      if(isNew)c.sections.push(s);
      save();m.remove();vCat(c.id,'manage');toast('Section saved');
    })
  ],true);
}
function admEditQ(c,q){
  var isNew=!q;if(isNew)q={id:uid(),sec:'',q:'',opts:['','','',''],c:0,ex:''};
  var secI=el('select');
  c.sections.forEach(function(s){secI.appendChild(el('option',{value:s.title,text:s.title}));});
  secI.appendChild(el('option',{value:'General',text:'General'}));
  secI.value=q.sec||'General';
  var qI=el('textarea',{style:'min-height:60px'});qI.value=q.q;
  var oIs=q.opts.map(function(o,i){var inp=el('input',{placeholder:'Option '+String.fromCharCode(65+i)});inp.value=o;return inp;});
  var cI=el('select');['A','B','C','D'].forEach(function(L,i){cI.appendChild(el('option',{value:String(i),text:L}));});
  cI.value=String(q.c);
  var exI=el('input',{placeholder:'Shown in answer review'});exI.value=q.ex||'';
  var kids=[div('field',[el('label',{text:'Section'}),secI]),div('field',[el('label',{text:'Question'}),qI])];
  oIs.forEach(function(o,i){kids.push(div('field',[el('label',{text:'Option '+String.fromCharCode(65+i)}),o]));});
  kids.push(div('field',[el('label',{text:'Correct answer'}),cI]));
  kids.push(div('field',[el('label',{text:'Explanation (optional)'}),exI]));
  kids.push(btn('Save question','pri',function(){
    if(!qI.value.trim()){toast('Question text required');return;}
    var missing=false;oIs.forEach(function(o){if(!o.value.trim())missing=true;});
    if(missing){toast('All 4 options required');return;}
    q.sec=secI.value;q.q=qI.value.trim();q.opts=oIs.map(function(o){return o.value.trim();});q.c=parseInt(cI.value);q.ex=exI.value;
    if(isNew)c.questions.push(q);
    save();m.remove();vCat(c.id,'manage');toast('Question saved');
  }));
  var m=modal((isNew?'Add':'Edit')+' question',kids,true);
}

function openCert(r){
  var nmI=el('input',{placeholder:'Full name as it should appear'});nmI.value=r.name||'';
  var cv=el('canvas',{cls:'certprev'});
  function redraw(){r.name=nmI.value;drawCert(cv,r);}
  nmI.addEventListener('input',redraw);
  nmI.addEventListener('change',save);
  var btnrow=el('div',{style:'display:flex;gap:10px;margin-top:14px;flex-wrap:wrap'});
  btnrow.appendChild(btn('⬇ Download PDF','grn',function(){certPdf(cv,r);}));
  btnrow.appendChild(btn('⬇ Download PNG','',function(){
    var a=el('a',{href:cv.toDataURL('image/png'),download:'Certificate_'+r.vid+'.png'});
    document.body.appendChild(a);a.click();a.remove();
  }));
  modal('Certificate — '+r.exam,[
    div('field',[el('label',{text:'Candidate name'}),nmI]),
    cv,
    btnrow
  ],true);
  redraw();
  save();
}
function drawCert(cv,r){
  var W=2000,H=1414;cv.width=W;cv.height=H;
  var x=cv.getContext('2d');
  x.fillStyle='#FDFDFB';x.fillRect(0,0,W,H);
  x.strokeStyle='rgba(14,124,123,0.05)';x.lineWidth=1;
  var g;
  for(g=0;g<W;g+=50){x.beginPath();x.moveTo(g,0);x.lineTo(g,H);x.stroke();}
  for(g=0;g<H;g+=50){x.beginPath();x.moveTo(0,g);x.lineTo(W,g);x.stroke();}
  x.strokeStyle='#0E7C7B';x.lineWidth=14;x.strokeRect(40,40,W-80,H-80);
  x.strokeStyle='#C9A227';x.lineWidth=3;x.strokeRect(68,68,W-136,H-136);
  x.strokeStyle='#C9A227';x.lineWidth=5;
  [[90,90,1,1],[1910,90,-1,1],[90,1324,1,-1],[1910,1324,-1,-1]].forEach(function(k){
    x.beginPath();x.moveTo(k[0],k[1]+40*k[3]);x.lineTo(k[0],k[1]);x.lineTo(k[0]+40*k[2],k[1]);x.stroke();
  });
  x.textAlign='center';
  x.fillStyle='#0E7C7B';x.font='700 26px "Segoe UI",Arial';
  x.fillText('S D M B R K   C O L L E C T I O N S',W/2,150);
  x.fillStyle='#8A948F';x.font='400 22px "Segoe UI",Arial';
  x.fillText('Regulatory Learning & Certification Portal',W/2,186);
  x.fillStyle='#1C2422';x.font='400 88px Georgia,serif';
  x.fillText('Certificate of Achievement',W/2,300);
  x.strokeStyle='#C9A227';x.lineWidth=3;
  x.beginPath();x.moveTo(W/2-260,330);x.lineTo(W/2+260,330);x.stroke();
  x.fillStyle='#5F6B67';x.font='400 30px "Segoe UI",Arial';
  x.fillText('This is to certify that',W/2,410);
  x.fillStyle='#0A5B5A';x.font='italic 700 80px Georgia,serif';
  x.fillText(r.name||'Candidate Name',W/2,510);
  x.strokeStyle='#DDE4E1';x.lineWidth=2;
  x.beginPath();x.moveTo(W/2-480,535);x.lineTo(W/2+480,535);x.stroke();
  x.fillStyle='#5F6B67';x.font='400 30px "Segoe UI",Arial';
  x.fillText('has successfully completed the examination for',W/2,600);
  x.fillStyle='#1C2422';x.font='700 52px "Segoe UI",Arial';
  x.fillText(r.exam,W/2,670);
  x.fillStyle='#5F6B67';x.font='400 30px "Segoe UI",Arial';
  x.fillText('with a score of',W/2,740);
  x.fillStyle='#16A34A';x.font='800 76px "Segoe UI",Arial';
  x.fillText(r.pct+'%',W/2,825);
  x.fillStyle='#E7F6EC';roundRect(x,W/2-140,860,280,64,32);x.fill();
  x.strokeStyle='#16A34A';x.lineWidth=3;roundRect(x,W/2-140,860,280,64,32);x.stroke();
  x.fillStyle='#116B33';x.font='800 34px "Segoe UI",Arial';
  x.fillText('P A S S E D',W/2,904);
  drawSeal(x,W-330,H-330,120);
  x.textAlign='left';x.fillStyle='#5F6B67';x.font='400 26px "Segoe UI",Arial';
  x.fillText('Date of issue',180,H-240);
  x.fillStyle='#1C2422';x.font='700 32px "Segoe UI",Arial';
  x.fillText(r.date,180,H-198);
  x.fillStyle='#5F6B67';x.font='400 26px "Segoe UI",Arial';
  x.fillText('Verification ID',180,H-140);
  x.fillStyle='#1C2422';x.font='700 32px Consolas,monospace';
  x.fillText(r.vid,180,H-98);
  x.textAlign='center';
  x.fillStyle='#8A948F';x.font='400 22px "Segoe UI",Arial';
  x.fillText('Sdmbrk Collections · Pass mark 70% · Verify using the ID above within the portal',W/2,H-60);
}
function roundRect(x,a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath();}
function drawSeal(x,cx,cy,R){
  x.save();
  var n=28;x.beginPath();
  for(var i=0;i<=n*2;i++){var ang=i*Math.PI/n;var rr=(i%2===0)?R:R*0.9;x.lineTo(cx+rr*Math.cos(ang),cy+rr*Math.sin(ang));}
  x.closePath();
  var gr=x.createRadialGradient(cx-30,cy-30,10,cx,cy,R);
  gr.addColorStop(0,'#E8CE7A');gr.addColorStop(0.6,'#C9A227');gr.addColorStop(1,'#9E7E17');
  x.fillStyle=gr;x.fill();
  x.beginPath();x.arc(cx,cy,R*0.74,0,Math.PI*2);x.strokeStyle='rgba(255,255,255,0.65)';x.lineWidth=3;x.stroke();
  x.fillStyle='#5C4A0D';x.textAlign='center';
  x.font='800 30px "Segoe UI",Arial';x.fillText('CERTIFIED',cx,cy-6);
  x.font='700 20px "Segoe UI",Arial';x.fillText('70% PASS MARK',cx,cy+26);
  x.fillStyle='#9E7E17';
  x.beginPath();x.moveTo(cx-46,cy+R*0.8);x.lineTo(cx-26,cy+R+74);x.lineTo(cx-6,cy+R+50);x.lineTo(cx-6,cy+R*0.8);x.closePath();x.fill();
  x.beginPath();x.moveTo(cx+46,cy+R*0.8);x.lineTo(cx+26,cy+R+74);x.lineTo(cx+6,cy+R+50);x.lineTo(cx+6,cy+R*0.8);x.closePath();x.fill();
  x.restore();
}
function certPdf(cv,r){
  function make(){
    var pdf=new window.jspdf.jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
    pdf.addImage(cv.toDataURL('image/jpeg',0.93),'JPEG',0,0,297,210);
    pdf.save('Certificate_'+r.vid+'.pdf');
  }
  if(window.jspdf){make();return;}
  var s=el('script',{src:'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'});
  s.onload=make;
  s.onerror=function(){toast('Offline — downloading PNG instead');var a=el('a',{href:cv.toDataURL('image/png'),download:'Certificate_'+r.vid+'.png'});document.body.appendChild(a);a.click();a.remove();};
  document.head.appendChild(s);
}
